services:
  redis:
    image: redis:7-alpine
    container_name: webpassworker-redis
    # Note: do NOT expose 6379 to host in production
    # ports:
    #   - "6379:6379"
    command: redis-server --requirepass ${REDIS_PASSWORD:-changeme}
    volumes:
      - redis_data:/data
    networks:
      - webpassworker
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build: .
    container_name: webpassworker-app
    extra_hosts:
      - "host.docker.internal:172.17.0.1"
      - "host-gateway:172.17.0.1"
    environment:
      PASSWORD: ${PASSWORD}
      BASE_SECRET: ${BASE_SECRET}
      REDIS_URL: redis://:${REDIS_PASSWORD:-changeme}@redis:6379
      ORIGIN_URL: ${ORIGIN_URL:-http://host.docker.internal:3001}
      PORT: 3000
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - webpassworker
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/__pw_gate_health"]
      interval: 10s
      timeout: 5s
      retries: 5

  nginx:
    image: nginx:alpine
    container_name: webpassworker-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - app
    networks:
      - webpassworker

networks:
  webpassworker:
    driver: bridge

volumes:
  redis_data:
